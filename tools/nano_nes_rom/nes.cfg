# NanoCamelid NES v3 (MMC5): ld65 builds ONLY the decode + engine banks and
# the CHR-ROM. The build script assembles the final 1 MiB image as:
#   header(16) + tri.bin (banks 0-124) + pad bank (125) + decode (126) +
#   engine (127, vectors) + chr.bin
MEMORY {
    ZP:     start = $0000, size = $0100, type = rw, file = "";
    DECODE: start = $A000, size = $2000, type = ro, file = %O, fill = yes, fillval = $FF;
    ENGINE: start = $E000, size = $2000, type = ro, file = %O, fill = yes, fillval = $FF;
    CHR:    start = $0000, size = $2000, type = ro, file = %O, fill = yes;
}
SEGMENTS {
    BIGRAM:   load = DECODE, type = ro, start = $A000;  # bi.bin at a known offset
    WORDS:    load = DECODE, type = ro;                 # word offset tables + strings
    CODE:     load = ENGINE, type = ro, start = $E000;
    RODATA:   load = ENGINE, type = ro;
    VECTORS:  load = ENGINE, type = ro, start = $FFFA;
    CHARS:    load = CHR,    type = ro;
    ZEROPAGE: load = ZP,     type = zp;
}
